name: Feature Request
about: Suggest a feature or improvement

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Help us understand your request.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature would you like to see?
      placeholder: "Describe the feature..."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What Problem Does This Solve?
      description: Explain the pain point or limitation it addresses
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: How would you use this feature?
      placeholder: "Describe the scenario where this helps..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Any workarounds or alternative approaches you've considered

  - type: textarea
    id: example
    attributes:
      label: Example
      description: Code example or mockup if applicable
      render: markdown

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information
