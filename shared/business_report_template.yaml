# Business Report Template (DPR)
## Detailed Project Report - Template & Schema

This YAML/JSON template defines the structure for all Detailed Project Reports generated by Agent 7 (DPR Compiler). Use this as the schema for exportable DPR artifacts.

---

```yaml
# ============================================================================
# DETAILED PROJECT REPORT (DPR) TEMPLATE
# ============================================================================
# This is the immutable, locked report that captures the complete business
# plan as validated by all 7 agents in the r2b-venture-architect system.
# 
# Version: 1.0
# Generated: [ISO 8601 timestamp]
# Locked: [true/false]

dpr:
  
  # ========================================================================
  # METADATA
  # ========================================================================
  metadata:
    report_id: "[Generated UUID]"
    idea_name: "[Business idea name]"
    idea_slug: "[lowercase-with-hyphens]"
    founder_name: "[Entrepreneur name from passport]"
    generated_timestamp: "[ISO 8601 timestamp]"
    locked_timestamp: "[ISO 8601 timestamp when locked]"
    dpr_version: "1.0"
    
    # Audit trail: Which agents signed off?
    validation_gates:
      profile_auditor: "PASSED"
      horizon_scanner: "PASSED"
      jargon_breaker: "PASSED"
      market_arbitrator: "PASSED"
      legal_compliance: "PASSED"  # CLEAR / FLAGGED / BLOCKED
      doom_scenario_tester: "PASSED"  # READY / PREPARE-FIRST / NOT-READY
      dpr_compiler: "PASSED"
    
    # Immutability lock
    is_locked: true
    lock_reason: "All 7 validation gates passed. Ready for execution."
  
  # ========================================================================
  # PART 1: EXECUTIVE SUMMARY
  # ========================================================================
  part_1_executive_summary:
    title: "Executive Summary"
    
    # One-sentence pitch
    pitch: "[One sentence that explains what the business does and who it serves]"
    
    # Problem & Solution
    problem_statement: "[What problem does this solve? For whom?]"
    solution_overview: "[How does your product/service solve it?]"
    
    # Key metrics snapshot
    metrics_snapshot:
      estimated_tam_usd: "[Total Addressable Market in dollars]"
      estimated_sam_usd: "[Serviceable Available Market]"
      year_1_revenue_target_usd: "[Revenue goal for Year 1]"
      startup_capital_required_usd: "[Amount needed to launch]"
      time_to_break_even_months: "[Number of months to profitability]"
      estimated_12_month_burn_rate_usd: "[Monthly average burn]"
      runway_months: "[How long can you operate before capital runs out?]"
    
    # Why this founder? Why now?
    founder_advantage: "[What makes this founder uniquely positioned to win?]"
    market_timing: "[Why is now the right time? What's the opportunity window?]"
    
    # Biggest risk & mitigation
    primary_risk: "[Single biggest failure mode]"
    primary_mitigation: "[How you're addressing it]"
    
    # Proof points (6-month targets)
    six_month_goals:
      revenue_target_usd: "[Revenue by Month 6]"
      customer_count_target: "[Number of paying customers by Month 6]"
      key_milestone_1: "[Major deliverable]"
      key_milestone_2: "[Major deliverable]"
  
  # ========================================================================
  # PART 2: MARKET OPPORTUNITY
  # ========================================================================
  part_2_market_opportunity:
    title: "Market Opportunity"
    
    problem:
      problem_statement: "[Detailed description of the problem]"
      affected_customer_segments:
        - segment_name: "[Customer type 1]"
          estimated_count: "[How many such customers exist?]"
          pain_point: "[What does this problem cost them?]"
          willingness_to_pay: "$[X per month/year]"
      
      current_solution:
        solution_type: "[How customers solve this today]"
        cost_today: "$[What they currently pay]"
        time_required: "[How long it takes]"
        quality_assessment: "[Is the current solution satisfactory?]"
        pain_points: "[What sucks about current solution?]"
    
    solution:
      solution_overview: "[What are you building?]"
      key_features:
        - feature_1: "[Core benefit]"
        - feature_2: "[Core benefit]"
        - feature_3: "[Core benefit]"
      
      competitive_advantages:
        - advantage_1: "[Why you're different]"
        - advantage_2: "[Why you're different]"
      
      why_better:
        faster_than_current: "[How much faster? Proof?]"
        cheaper_than_current: "[How much cheaper? Calculation?]"
        better_quality: "[What's superior? Why?]"
    
    market_sizing:
      tam:
        value_usd: "$[Total Addressable Market]"
        source: "[Gartner / McKinsey / PitchBook / Other research]"
        calculation_logic: "[How did you arrive at this number?]"
      
      sam:
        value_usd: "$[Serviceable Available Market - what you can realistically reach]"
        calculation_logic: "[How did you narrow TAM to SAM?]"
      
      som_year_1:
        value_usd: "$[Serviceable Obtainable Market - Year 1 target]"
        customer_count: "[Number of customers]"
        calculation_logic: "[Why is this achievable in Year 1?]"
    
    competitive_landscape:
      competitors:
        - competitor_name: "[Company name]"
          funding: "$[Total funding]"
          user_count: "[How many users/customers]"
          market_position: "[What % market share or positioning?]"
          why_you_win: "[Your specific advantage vs this competitor]"
          threat_level: "[High / Medium / Low]"
    
    market_timing:
      market_trends: "[What's driving demand now?]"
      regulatory_tailwinds: "[Any favorable regulatory changes?]"
      technology_enablers: "[What tech makes this possible now?]"
      opportunity_window: "[How long before this window closes?]"
  
  # ========================================================================
  # PART 3: BUSINESS MODEL & FINANCIALS
  # ========================================================================
  part_3_business_model_financials:
    title: "Business Model & Financials"
    
    revenue_model:
      model_type: "[Subscription / Licensing / Freemium / One-time / Hybrid]"
      
      customer_segments:
        - segment_name: "[Customer type]"
          revenue_model: "[How you charge them]"
          price_point: "$[Price per unit/month/year]"
          acv_annual_contract_value: "$[Average annual revenue per customer]"
          payment_frequency: "[Monthly / Annual / Per-use]"
      
      pricing_logic: "[Why this price? What's your justification?]"
      alternative_revenue_streams: "[Any secondary revenue? (Marketplace, data, etc.)]"
    
    unit_economics:
      customer_acquisition_cost: "$[CAC]"
      lifetime_value: "$[LTV]"
      ltv_to_cac_ratio: "[LTV / CAC (should be >3x)]"
      gross_margin_percent: "[% after COGS]"
      monthly_churn_rate_percent: "[% of customers lost each month]"
      payback_period_months: "[How long to recover CAC?]"
    
    startup_costs:
      cost_category_1: "[e.g., MVP development]"
      cost_1_amount: "$[Amount]"
      cost_category_2: "[e.g., Infrastructure setup]"
      cost_2_amount: "$[Amount]"
      cost_category_3: "[e.g., Legal/compliance setup]"
      cost_3_amount: "$[Amount]"
      total_startup_capital_needed: "$[Total]"
    
    monthly_operating_costs:
      founder_salary_monthly: "$[Amount]"
      infrastructure_aws_etc_monthly: "$[Amount]"
      marketing_customer_acquisition_monthly: "$[Amount]"
      other_operational_costs_monthly: "$[Amount]"
      total_monthly_burn_rate: "$[Amount]"
    
    twelve_month_projection:
      month_1_3_phase: "MVP Development"
      month_1_3_revenue: "$0"
      month_1_3_burn: "$[Total burn for 3 months]"
      month_1_3_milestones: "[Deliverables by Month 3]"
      
      month_4_6_phase: "Launch & Validation"
      month_4_6_revenue: "$[Projected revenue]"
      month_4_6_burn: "$[Projected burn]"
      month_4_6_customer_count: "[Number of customers]"
      month_4_6_mrr: "$[Monthly Recurring Revenue target]"
      month_4_6_milestones: "[Deliverables by Month 6]"
      
      month_7_12_phase: "Scale"
      month_7_12_revenue: "$[Projected revenue]"
      month_7_12_burn: "$[Projected burn]"
      month_7_12_customer_count: "[Number of customers]"
      month_7_12_mrr: "$[Monthly Recurring Revenue target]"
      month_7_12_milestones: "[Deliverables by Month 12]"
      
      year_1_total_revenue: "$[Total revenue for 12 months]"
      year_1_total_burn: "$[Total burn for 12 months]"
      year_1_net_profit_loss: "$[Revenue - Burn]"
      year_1_ending_runway_months: "[How many months of capital remain?]"
    
    funding_requirements:
      available_capital: "$[From founder's pocket]"
      capital_required_for_12_months: "$[Burn + startup costs]"
      funding_gap: "$[If any]"
      proposed_gap_solution: "[How will you close the gap? Early revenue? Raise? Co-founder?]"
    
    compliance_cost_integration:
      regulatory_compliance_cost_year_1: "$[From Legal Agent]"
      compliance_items:
        - item_1: "[e.g., Privacy policy & legal setup]"
          cost_1: "$[Amount]"
        - item_2: "[e.g., Industry-specific registration]"
          cost_2: "$[Amount]"
      impact_on_burn_rate: "[How does compliance affect monthly burn?]"
  
  # ========================================================================
  # PART 4: GO-TO-MARKET STRATEGY
  # ========================================================================
  part_4_go_to_market:
    title: "Go-to-Market Strategy"
    
    customer_acquisition:
      primary_channel: "[Direct sales / Content / Partnerships / Marketplace / Other]"
      channel_details: "[How specifically will you reach customers?]"
      cost_per_acquisition: "$[CAC from Part 3]"
      expected_conversion_rate_percent: "[% of prospects who become customers]"
      time_to_first_customer_weeks: "[How many weeks to first paying customer?]"
    
    launch_strategy:
      phase_1_weeks_1_4: "[What you're doing in the first month]"
      phase_1_milestones: "[Deliverables]"
      
      phase_2_weeks_5_8: "[Beta/early traction phase]"
      phase_2_milestones: "[Deliverables]"
      
      phase_3_weeks_9_12: "[Full launch phase]"
      phase_3_milestones: "[Deliverables]"
    
    customer_retention:
      retention_strategy: "[How will you keep customers?]"
      churn_reduction_tactics:
        - tactic_1: "[Strategy to reduce churn]"
        - tactic_2: "[Strategy to reduce churn]"
    
    expansion_strategy:
      upsell_opportunity: "[What will you sell next to existing customers?]"
      cross_sell_opportunity: "[What adjacent products could you offer?]"
      land_and_expand_plan: "[How do you grow revenue per customer?]"
    
    competitive_positioning:
      key_differentiator: "[Your single biggest differentiator]"
      why_defensible: "[Why can't competitors copy you in 6 months?]"
      positioning_statement: "[How you position yourself vs. competitors]"
  
  # ========================================================================
  # PART 5: FOUNDER FIT & EXECUTION ROADMAP
  # ========================================================================
  part_5_founder_fit_roadmap:
    title: "Founder Fit & Execution Roadmap"
    
    founder_advantages:
      existing_strength_1: "[Skill or asset]"
      how_leveraged_1: "[How does this help the business?]"
      
      existing_strength_2: "[Skill or asset]"
      how_leveraged_2: "[How does this help the business?]"
      
      existing_strength_3: "[Skill or asset]"
      how_leveraged_3: "[How does this help the business?]"
      
      existing_network: "[Do you have relevant relationships?]"
      network_impact: "[How will this help customer acquisition or product development?]"
    
    skill_gaps:
      gap_1:
        skill_gap: "[e.g., Enterprise B2B sales]"
        impact: "[Why does this matter?]"
        solution: "[How will you close this gap? Learning? Hire? Partner?]"
        timeline_weeks: "[When do you need this skill?]"
      
      gap_2:
        skill_gap: "[e.g., Product management]"
        impact: "[Why does this matter?]"
        solution: "[How will you close this gap?]"
        timeline_weeks: "[When do you need this skill?]"
    
    execution_roadmap_monthly:
      month_1:
        phase: "MVP Development - Foundation"
        key_activities:
          - activity_1: "[Specific task]"
          - activity_2: "[Specific task]"
          - activity_3: "[Specific task]"
        milestones: "[What 'done' looks like]"
        success_metric: "[How you'll know you succeeded]"
      
      month_2:
        phase: "MVP Development - Building"
        key_activities:
          - activity_1: "[Specific task]"
          - activity_2: "[Specific task]"
        milestones: "[What 'done' looks like]"
        success_metric: "[How you'll know you succeeded]"
      
      month_3:
        phase: "MVP Development - Polish & Beta"
        key_activities:
          - activity_1: "[Testing with early users]"
          - activity_2: "[Feedback integration]"
        milestones: "[Working MVP + 5 beta testers]"
        success_metric: "[Product-ready for limited launch]"
      
      month_4:
        phase: "Launch - Soft Launch"
        key_activities:
          - activity_1: "[Launch to beta customers]"
          - activity_2: "[Gather feedback]"
        milestones: "[First paying customers]"
        success_metric: "[3-5 customers, positive feedback]"
      
      month_5:
        phase: "Traction - Scale to Cohort"
        key_activities:
          - activity_1: "[Customer success focus]"
          - activity_2: "[Acquisition acceleration]"
        milestones: "[15-20 customers]"
        success_metric: "[$[X] MRR, consistent churn rate]"
      
      month_6:
        phase: "Validation - PMF Decision"
        key_activities:
          - activity_1: "[Analyze product-market fit signals]"
          - activity_2: "[Make scale vs. pivot decision]"
        milestones: "[Decision gate: continue or pivot?]"
        success_metric: "[Clear path to growth or clear pivot direction]"
      
      # Months 7-12 summary (less detail, more strategic)
      months_7_12:
        phase: "Scale & Optimize"
        strategic_focus: "[Grow customer base, optimize unit economics, plan for next phase]"
        target_by_month_12: "[Revenue target, customer target, key metrics]"
    
    decision_gates:
      gate_1_month_6:
        decision_point: "Product-Market Fit Assessment"
        criteria: "[What indicates PMF is achieved?]"
        path_if_yes: "[Continue scaling]"
        path_if_no: "[Pivot to [alternative market / revenue model / customer segment]]"
        pivot_options: "[Specific pivots if needed]"
      
      gate_2_month_9:
        decision_point: "Unit Economics & Scalability"
        criteria: "[What indicates unit economics are healthy?]"
        path_if_yes: "[Accelerate customer acquisition]"
        path_if_no: "[Reduce burn, optimize CAC, or pivot]"
  
  # ========================================================================
  # PART 6: RISK MITIGATION & CONTINGENCY
  # ========================================================================
  part_6_risk_mitigation:
    title: "Risk Mitigation & Contingency"
    
    top_3_failure_scenarios:
      scenario_1:
        name: "[e.g., Market Validation Failure]"
        probability: "[High / Medium / Low]"
        description: "[What is this failure mode?]"
        why_vulnerable: "[Why is this founder vulnerable to it?]"
        impact_if_occurs: "[What happens to the business?]"
        timeline_to_death_if_unchecked_months: "[How long before fatal?]"
        
        early_warning_signs:
          sign_1: "[By Week 8, if X metric is <Y, you're heading toward failure]"
          sign_2: "[By Month 3, if X metric is <Y, you're heading toward failure]"
          sign_3: "[By Month 6, if X metric is <Y, you're in failure mode]"
        
        mitigation_strategy:
          mitigation_1:
            tactic: "[Specific preventive action]"
            timeline_weeks: "[When to implement]"
            cost: "$[Amount or 'free']"
            owner: "[Founder / Partner / TBD]"
            success_indicator: "[How you'll know it worked]"
          
          mitigation_2:
            tactic: "[Specific preventive action]"
            timeline_weeks: "[When to implement]"
            cost: "$[Amount or 'free']"
            owner: "[Founder / Partner / TBD]"
            success_indicator: "[How you'll know it worked]"
          
          fallback_tactic:
            description: "[If failure is inevitable, what's Plan B?]"
            pivot_to: "[Alternative market / revenue model / customer segment]"
            cost_of_pivot: "$[Amount]"
            timeline_to_execute_weeks: "[How long to pivot?]"
      
      scenario_2:
        name: "[e.g., Cash Burn Failure]"
        probability: "[High / Medium / Low]"
        description: "[What is this failure mode?]"
        why_vulnerable: "[Why is this founder vulnerable?]"
        impact_if_occurs: "[What happens?]"
        timeline_to_death_if_unchecked_months: "[How long before fatal?]"
        
        early_warning_signs:
          sign_1: "[By Month X...]"
          sign_2: "[By Month X...]"
        
        mitigation_strategy:
          mitigation_1:
            tactic: "[Specific preventive action]"
            timeline_weeks: "[When]"
            cost: "$[Amount]"
            owner: "[Founder / Partner / TBD]"
            success_indicator: "[How you'll know it worked]"
      
      scenario_3:
        name: "[e.g., Execution Failure]"
        probability: "[High / Medium / Low]"
        description: "[What is this failure mode?]"
        why_vulnerable: "[Why is this founder vulnerable?]"
        impact_if_occurs: "[What happens?]"
        timeline_to_death_if_unchecked_months: "[How long before fatal?]"
        
        early_warning_signs:
          sign_1: "[By Week X...]"
          sign_2: "[By Month X...]"
        
        mitigation_strategy:
          mitigation_1:
            tactic: "[Specific preventive action]"
            timeline_weeks: "[When]"
            cost: "$[Amount]"
            owner: "[Founder / Partner / TBD]"
            success_indicator: "[How you'll know it worked]"
    
    regulatory_legal_clearance:
      verdict: "[CLEAR / FLAGGED / BLOCKED]"
      status: "[What's the current regulatory status?]"
      compliance_requirements:
        requirement_1: "[e.g., GDPR compliance]"
        cost_1: "$[Amount]"
        timeline_1: "[By when?]"
      potential_blockers: "[Any deal-breaker regulations?]"
      path_forward: "[How will you navigate regulatory requirements?]"
      professional_help_needed: "[Lawyer, accountant, consultant recommendations?]"
    
    early_warning_dashboard:
      phase_1_months_1_3:
        metric_name: "[What you're measuring]"
        target_by_end_of_phase: "[What should you achieve?]"
        measurement_frequency: "[Weekly / Bi-weekly / Monthly]"
        threshold_for_concern: "[If <this value, trigger mitigation]"
        mitigation_trigger: "[What you must do immediately if threshold breached]"
      
      phase_2_months_4_6:
        metric_name: "[What you're measuring]"
        target_by_end_of_phase: "[What should you achieve?]"
        measurement_frequency: "[Weekly / Bi-weekly / Monthly]"
        threshold_for_concern: "[If <this value, trigger mitigation]"
        mitigation_trigger: "[What you must do immediately]"
      
      phase_3_months_7_12:
        metric_name: "[What you're measuring]"
        target_by_end_of_phase: "[What should you achieve?]"
        measurement_frequency: "[Weekly / Bi-weekly / Monthly]"
        threshold_for_concern: "[If <this value, trigger mitigation]"
        mitigation_trigger: "[What you must do immediately]"
    
    survival_readiness:
      founder_mental_readiness: "[Ready / Partially Ready / Not Ready]"
      founder_technical_readiness: "[Ready / Partially Ready / Not Ready]"
      capital_readiness: "[Fully Funded / Partially Funded / Under-funded]"
      network_readiness: "[Ready / Partially Ready / Not Ready]"
      overall_readiness_score: "[X/4: Ready (4/4) / Mostly Ready (3/4) / Partially Ready (2/4) / Not Ready (0-1/4)]"
      readiness_gaps: "[What needs to happen before launch?]"
```

---

## EXPORT FORMATS

This template can be exported as:

1. **PDF** (15-20 pages, formatted, ready to print/share)
2. **Markdown** (One-pager summary + links to detailed sections)
3. **JSON** (Machine-readable for downstream tools)
4. **Excel** (Financial projections, unit economics, early warning dashboard)

---

## USAGE

- This template is populated by Agent 7 (DPR Compiler)
- Lock the DPR into `entrepreneur_passport.yaml` under `dpr_lockfile`
- Mark as immutable once locked (changes require re-validation)
- Export to multiple formats for different audiences
