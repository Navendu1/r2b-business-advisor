# Entrepreneur Passport: Shared State Ledger
# This file is the single source of truth for all agents
# NO agent operates from conversational memory alone; all critical data lives here

# ============================================================================
# SECTION 1: DEMOGRAPHIC PROFILE
# ============================================================================
entrepreneur:
  name: "Jordan Chen"
  age: 28
  background: "Software Engineer with ML specialization"
  years_of_experience: 5
  location:
    city: "Austin"
    state: "TX"
    country: "USA"
  time_availability_hours_per_week: 40  # Full-time commitment

# ============================================================================
# SECTION 2: FINANCIAL CONSTRAINTS (THE HARD GATE)
# ============================================================================
capital:
  available_investment_usd: 5000
  currency: "USD"
  funding_stage: "bootstrap"
  willing_to_seek_external_funding: false
  monthly_burn_rate_tolerance_usd: 500

# ============================================================================
# SECTION 3: CORE CAPABILITIES & ASSETS
# ============================================================================
